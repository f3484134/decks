<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VincentGPT — Pixel Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #1a1a2e;
      overflow: hidden;
      font-family: 'monogram', monospace;
    }
    canvas { display: block; }

    #dialogue-box {
      display: none;
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      width: min(90vw, 680px);
      background: rgba(15, 15, 35, 0.95);
      border: 3px solid #58a6ff;
      border-radius: 12px;
      padding: 24px 32px;
      color: #e6edf3;
      font-size: 18px;
      line-height: 1.6;
      z-index: 100;
      backdrop-filter: blur(8px);
    }
    #dialogue-box a {
      color: #58a6ff;
      text-decoration: underline;
    }
    #dialogue-box .close-hint {
      display: block;
      margin-top: 12px;
      font-size: 13px;
      color: #8b949e;
    }

    #hint {
      position: fixed;
      top: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(15, 15, 35, 0.85);
      border: 2px solid #30363d;
      border-radius: 8px;
      padding: 10px 20px;
      color: #8b949e;
      font-size: 14px;
      z-index: 50;
      transition: opacity 0.5s;
    }

    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #e6edf3;
      font-size: 24px;
      z-index: 200;
    }
    #loading.hidden { display: none; }

    @font-face {
      font-family: 'monogram';
      src: url('./monogram.ttf');
    }
  </style>
</head>
<body>
  <div id="loading">Loading room... 🦞</div>
  <div id="hint">↑↓←→ to move · Walk into objects to interact</div>
  <div id="dialogue-box">
    <div id="dialogue-text"></div>
    <span class="close-hint">Press ENTER or click to close</span>
  </div>

  <script src="https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs" type="module"></script>
  <script type="module">
    import kaboom from "https://unpkg.com/kaboom@3000.1.17/dist/kaboom.mjs";

    const k = kaboom({
      width: 1280,
      height: 720,
      letterbox: true,
      background: [26, 26, 46],
      global: false,
    });

    const scaleFactor = 4;

    // ═══════ DIALOGUE DATA ═══════
    const dialogueData = {
      pc: `This is where all the magic happens. My AI agent <strong>Bob</strong> 🦞 lives here — running on OpenClaw, he handles research, automation, creative projects, and system ops 24/7.<br><br>Check out our work: <a href="/decks/my-lobster/" target="_blank">My Lobster (our story)</a>`,
      tv: `My project showcase 🎬<br><br>• <a href="/decks/hn-redesign/" target="_blank">HN Redesign</a> — Product redesign deck<br>• <a href="/decks/claude-skills/" target="_blank">Claude Skills</a> — AI skills presentation<br>• <a href="/apps/brain-gym/" target="_blank">Brain Gym</a> — Cognitive training game`,
      resume: `Hi, I'm <strong>Vincent</strong> — a design leader exploring the frontier of human-AI collaboration.<br><br>Currently working at Microsoft, building tools and frameworks that bridge design and AI. This room is my digital playground, powered by an AI agent named Bob.`,
      library: `Research & Knowledge 📚<br><br>1,500+ articles processed, 150 wiki pages curated. Topics include: context engineering, agent memory, human-AI symbiosis, intentional friction, and more.<br><br>All synthesized into an interconnected knowledge graph in Obsidian.`,
      projects: `Live Projects:<br><br>• <a href="/apps/brain-gym/" target="_blank">🎮 Brain Gym</a> — PWA cognitive training<br>• <a href="/decks/my-lobster/" target="_blank">🦞 My Lobster</a> — How I work with AI<br>• <a href="/decks/hn-redesign/" target="_blank">📰 HN Redesign</a> — Product design exercise<br>• 🎥 Founder's Playbook — AI-narrated video summary`,
      radio: `Bob handles my daily automations 🤖<br><br>• Weekly AI industry briefings (every Monday 8:30am)<br>• Bookmark processing → wiki notes<br>• System health monitoring 24/7<br>• Research paper summaries on demand`,
      exit: `Thanks for visiting! 👋<br><br>Want to connect? Find me at <strong>vincentgpt.com</strong><br><br>This entire room, the presentations, and the AI pipeline were built collaboratively with Bob — an AI agent that lives on my server.`,
      alx_certificate: `The Agent Team 🦸<br><br>Bob orchestrates a team of specialized AI agents:<br>Stephen (Researcher), Steve (PM), Tony (Architect), Natasha (Designer), Vision (Developer), Thor (QA).<br><br>Together we ship projects end-to-end.`,
      biotech_degree: `Tech Stack 🛠️<br><br>• <strong>Platform:</strong> OpenClaw on Azure VM<br>• <strong>AI:</strong> Claude Opus 4.6, GPT Image Gen<br>• <strong>Tools:</strong> Obsidian, GitHub, Discord, Vercel<br>• <strong>Languages:</strong> Python, JavaScript, HTML/CSS<br>• <strong>Frameworks:</strong> Kaboom.js, Reveal.js, Three.js`,
    };

    // ═══════ LOAD ASSETS ═══════
    k.loadSprite("spritesheet", "./spritesheet.png", {
      sliceX: 39,
      sliceY: 31,
      anims: {
        "idle-down": 936,
        "walk-down": { from: 936, to: 939, loop: true, speed: 8 },
        "idle-side": 975,
        "walk-side": { from: 975, to: 978, loop: true, speed: 8 },
        "idle-up": 1014,
        "walk-up": { from: 1014, to: 1017, loop: true, speed: 8 },
      },
    });

    k.loadSprite("map", "./map.png");

    // ═══════ DIALOGUE UI ═══════
    function displayDialogue(text, onClose) {
      const box = document.getElementById("dialogue-box");
      const textEl = document.getElementById("dialogue-text");
      box.style.display = "block";
      textEl.innerHTML = "";

      // Typewriter effect
      let i = 0;
      let inTag = false;
      const interval = setInterval(() => {
        if (i < text.length) {
          const char = text[i];
          if (char === "<") inTag = true;
          if (inTag) {
            // Fast-forward through HTML tags
            let tagEnd = text.indexOf(">", i);
            textEl.innerHTML += text.slice(i, tagEnd + 1);
            i = tagEnd + 1;
            if (text[tagEnd - 1] !== "/") inTag = false; // self-closing check
            inTag = false;
          } else {
            textEl.innerHTML += char;
            i++;
          }
        } else {
          clearInterval(interval);
        }
      }, 12);

      function close() {
        clearInterval(interval);
        box.style.display = "none";
        document.removeEventListener("keydown", handleKey);
        box.removeEventListener("click", close);
        if (onClose) onClose();
      }
      function handleKey(e) {
        if (e.key === "Enter" || e.key === "Escape") close();
      }
      document.addEventListener("keydown", handleKey);
      box.addEventListener("click", close);
    }

    // ═══════ CAMERA ═══════
    function setCamScale(k) {
      const resizeFactor = k.width() / k.height();
      if (resizeFactor < 1) {
        k.camScale(k.vec2(1));
      } else {
        k.camScale(k.vec2(1.5));
      }
    }

    // ═══════ MAIN SCENE ═══════
    k.scene("main", async () => {
      const mapData = await (await fetch("./map.json")).json();
      const layers = mapData.layers;

      const map = k.add([k.sprite("map"), k.pos(0), k.scale(scaleFactor)]);

      const player = k.make([
        k.sprite("spritesheet", { anim: "idle-down" }),
        k.area({ shape: new k.Rect(k.vec2(0, 3), 10, 10) }),
        k.body(),
        k.anchor("center"),
        k.pos(),
        k.scale(scaleFactor),
        {
          speed: 250,
          direction: "down",
          isInDialogue: false,
        },
        "player",
      ]);

      for (const layer of layers) {
        if (layer.name === "boundaries") {
          for (const boundary of layer.objects) {
            map.add([
              k.area({ shape: new k.Rect(k.vec2(0), boundary.width, boundary.height) }),
              k.body({ isStatic: true }),
              k.pos(boundary.x, boundary.y),
              boundary.name,
            ]);

            if (boundary.name) {
              player.onCollide(boundary.name, () => {
                if (player.isInDialogue) return;
                player.isInDialogue = true;
                displayDialogue(
                  dialogueData[boundary.name] || "Nothing here yet...",
                  () => (player.isInDialogue = false)
                );
              });
            }
          }
          continue;
        }

        if (layer.name === "spawnpoints") {
          for (const entity of layer.objects) {
            if (entity.name === "player") {
              player.pos = k.vec2(
                (map.pos.x + entity.x) * scaleFactor,
                (map.pos.y + entity.y) * scaleFactor
              );
              k.add(player);
            }
          }
        }
      }

      setCamScale(k);
      k.onResize(() => setCamScale(k));
      k.onUpdate(() => k.camPos(player.pos.x, player.pos.y));

      // ═══════ MOVEMENT ═══════
      const dirs = { left: false, right: false, up: false, down: false };

      k.onKeyDown("left", () => { dirs.left = true; });
      k.onKeyDown("right", () => { dirs.right = true; });
      k.onKeyDown("up", () => { dirs.up = true; });
      k.onKeyDown("down", () => { dirs.down = true; });
      k.onKeyRelease("left", () => { dirs.left = false; });
      k.onKeyRelease("right", () => { dirs.right = false; });
      k.onKeyRelease("up", () => { dirs.up = false; });
      k.onKeyRelease("down", () => { dirs.down = false; });

      // Arrow key aliases
      k.onKeyDown("a", () => { dirs.left = true; });
      k.onKeyDown("d", () => { dirs.right = true; });
      k.onKeyDown("w", () => { dirs.up = true; });
      k.onKeyDown("s", () => { dirs.down = true; });
      k.onKeyRelease("a", () => { dirs.left = false; });
      k.onKeyRelease("d", () => { dirs.right = false; });
      k.onKeyRelease("w", () => { dirs.up = false; });
      k.onKeyRelease("s", () => { dirs.down = false; });

      k.onUpdate(() => {
        if (player.isInDialogue) {
          player.play("idle-" + (player.direction === "left" || player.direction === "right" ? "side" : player.direction));
          return;
        }

        let moving = false;
        if (dirs.left) {
          player.move(-player.speed, 0);
          player.direction = "left";
          player.flipX = true;
          moving = true;
        }
        if (dirs.right) {
          player.move(player.speed, 0);
          player.direction = "right";
          player.flipX = false;
          moving = true;
        }
        if (dirs.up) {
          player.move(0, -player.speed);
          player.direction = "up";
          moving = true;
        }
        if (dirs.down) {
          player.move(0, player.speed);
          player.direction = "down";
          moving = true;
        }

        if (moving) {
          const animKey = player.direction === "left" || player.direction === "right" ? "walk-side" : "walk-" + player.direction;
          if (player.curAnim() !== animKey) player.play(animKey);
        } else {
          const idleKey = player.direction === "left" || player.direction === "right" ? "idle-side" : "idle-" + player.direction;
          if (player.curAnim() !== idleKey) player.play(idleKey);
        }
      });

      // Hide loading
      document.getElementById("loading").classList.add("hidden");

      // Hide hint after 5s
      setTimeout(() => {
        document.getElementById("hint").style.opacity = "0";
      }, 5000);
    });

    k.go("main");
  </script>
</body>
</html>
